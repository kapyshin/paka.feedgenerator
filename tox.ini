[tox]
envlist = py312
test_args = -m unittest discover --start-directory tests/

[testenv]
extras = testing
commands =
    python --version
    python {[tox]test_args}

[testenv:coverage]
usedevelop = true
basepython = python3.12
deps = coverage
commands =
    python3 --version
    coverage3 run --rcfile={toxinidir}/.coveragerc {[tox]test_args}
    coverage3 html -d {envtmpdir}/cov_html
